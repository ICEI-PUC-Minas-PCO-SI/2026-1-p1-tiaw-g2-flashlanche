<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FlashLanche - Carrinho</title>
  <link rel="icon" type="image/jpeg" href="../../../assets/favicon.jpg">

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />

  <link rel="stylesheet" href="../../../styles.css" />
  <link rel="stylesheet" href="cart.css" />
</head>
<body>

<!-- ═════════════════════════════════════════════════════TOP NAV════════════════════════════════════════════════════════════ -->
<nav class="top-nav">
  <div class="container">
    <div class="nav-container">
      <a href="../../../index.html" class="nav-logo">
        <div class="nav-logo-mark"><i class="bi bi-bag-heart-fill"></i></div>
        FlashLanche
      </a>
      <div class="nav-actions">
        <button class="nav-btn" onclick="voltarParaShop()"><i class="bi bi-shop"></i> Continuar Comprando</button>
      </div>
    </div>
  </div>
</nav>

<!-- ═════════════════════════════════════════════════════CART SECTION═══════════════════════════════════════════════════════ -->
<section class="cart-container">
  <div class="container">
    <h1 class="cart-title"><i class="bi bi-cart-fill"></i> Seu Carrinho</h1>
    
    <div class="cart-layout">
      <!-- ═════════════════════════════════════════════════════ITEMS════════════════════════════════════════════════════════════ -->
      <div class="cart-items" id="cart-items-container">
        <div class="cart-empty">
          <p style="font-size: 48px; margin-bottom: 16px;"><i class="bi bi-inbox"></i></p>
          <p>Seu carrinho está vazio</p>
          <button class="btn-checkout" style="width: auto; margin-top: 16px;" onclick="voltarParaShop()">Ir para a Loja</button>
        </div>
      </div>

      <!-- ═════════════════════════════════════════════════════SUMARIO═════════════════════════════════════════════════════ -->
      <div class="cart-summary">
        <h3 style="margin-bottom: 20px; font-weight: 700;">Resumo</h3>
        
        <div class="summary-row">
          <span class="summary-label">Subtotal</span>
          <span class="summary-value">R$ <span id="subtotal">0.00</span></span>
        </div>
        
        <div class="summary-row">
          <span class="summary-label">Taxa (0%)</span>
          <span class="summary-value">R$ <span id="taxa">0.00</span></span>
        </div>
        
        <div class="summary-total">
          <span>Total</span>
          <span>R$ <span id="total">0.00</span></span>
        </div>

        <button class="btn-checkout" onclick="irParaCheckout()" id="btn-checkout" disabled>
          <i class="bi bi-credit-card"></i> Ir para Checkout
        </button>

        <button class="btn-checkout" style="background: var(--text-secondary); margin-top: 10px;" onclick="limparCarrinho()">
          <i class="bi bi-trash"></i> Limpar Carrinho
        </button>
      </div>
    </div>
  </div>
</section>

<script src="../../../db/db.js"></script>
<script src="cart.js"></script>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FlashLanche - Gerenciamento de Produtos</title>
  <link rel="icon" type="image/jpeg" href="../../../assets/favicon.jpg">

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  
  <link rel="stylesheet" href="../../../styles.css"/>
  <link rel="stylesheet" href="products.css"/>

</head>
<body>

<div class="manager-layout">
  <!-- ========================= SIDEBAR ========================= -->
  <aside class="sidebar">
    <a href="#" class="sidebar-logo">
      <div class="sidebar-logo-mark"><i class="bi bi-bag-heart-fill"></i></div>
      FlashLanche
    </a>

    <nav class="sidebar-nav">
      <li><a href="../dashboard/dashboard.html"><i class="bi bi-speedometer2"></i> Dashboard</a></li>
      <li><a href="products.html" class="active"><i class="bi bi-box-seam"></i> Produtos</a></li>
      <li><a href="../pedidos/orders.html"><i class="bi bi-receipt"></i> Pedidos</a></li>
      <li><a href="../horarios/timeslots.html"><i class="bi bi-calendar-event"></i> Horários</a></li>
      <li><a href="../estoque/stock.html"><i class="bi bi-stack"></i> Estoque</a></li>
      <li><a href="../validacaoQR/qr-validation.html"><i class="bi bi-qr-code-scan"></i> QR Codes</a></li>
    </nav>

    <button class="logout-btn" onclick="logout()"><i class="bi bi-box-arrow-right"></i> Sair</button>
  </aside>

  <!-- ========================= CONTENT ========================= -->
  <main class="content">
    <div class="top-bar">
      <h1 class="page-title"><i class="bi bi-box-seam"></i> 
        Produtos
      </h1>
      <button class="btn-novo" onclick="abrirModal()">
        <i class="bi bi-plus-circle"></i> 
        Novo Produto
      </button>
    </div>

    <div class="products-grid" id="products-grid"></div>
  </main>
</div>

<!-- ========================= MODAL FORMULARIO ========================= -->
<div class="modal" id="modal-form">
  <div class="modal-content">
    <div class="modal-header" id="modal-title">
      Novo Produto
    </div>
    
    <div class="form-group">
      <label class="form-label">
        Nome
      </label>
      <input type="text" id="nome" class="form-input" placeholder="Ex: Misto Quente">
    </div>

    <div class="form-group">
      <label class="form-label">
        Descrição
      </label>
      <input type="text" id="descricao" class="form-input" placeholder="Ex: Pão de queijo quente">
    </div>

    <div class="form-group">
      <label class="form-label">
        Preço (R$)
      </label>
      <input type="number" id="preco" class="form-input" placeholder="8.50" step="0.01">
    </div>

    <div class="form-group">
      <label class="form-label">
        Categoria
      </label>
      <select id="categoria" class="form-input">
        <option value="lanches">
          Lanches
        </option>
        <option value="bebidas">
          Bebidas
        </option>
        <option value="refeições">
          Refeições
        </option>
      </select>
    </div>

    <div class="form-group">
      <label class="form-label">
        Emoji/Ícone
      </label>
      <input type="text" id="imagem" class="form-input" placeholder="🥪">
    </div>

    <button class="btn-submit" id="btn-save" onclick="salvarProduto()">
      Adicionar Produto
    </button>
    <button class="btn-submit" style="background: var(--text-secondary); margin-top: 8px;" onclick="fecharModal()">
      Cancelar
    </button>
  </div>
</div>

<script src="../../../db/db.js"></script>
<script src="products.js"></script>

</body>
</html>

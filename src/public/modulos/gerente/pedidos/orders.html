<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FlashLanche - Gerenciamento de Pedidos</title>
  <link rel="icon" type="image/jpeg" href="../../../assets/favicon.jpg">

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  
  <link rel="stylesheet" href="../../../styles.css"/>
  <link rel="stylesheet" href="orders.css"/>

</head>
<body>

<div class="manager-layout">
  <!-- ═════════════════════════════════════════════════════SIDEBAR═════════════════════════════════════════ -->
  <aside class="sidebar">
    <a href="#" class="sidebar-logo">
      <div class="sidebar-logo-mark"><i class="bi bi-bag-heart-fill"></i></div>
      FlashLanche
    </a>

    <nav class="sidebar-nav">
      <li><a href="../dashboard/dashboard.html"><i class="bi bi-speedometer2"></i> Dashboard</a></li>
      <li><a href="../produtos/products.html"><i class="bi bi-box-seam"></i> Produtos</a></li>
      <li><a href="orders.html" class="active"><i class="bi bi-receipt"></i> Pedidos</a></li>
      <li><a href="../horarios/timeslots.html"><i class="bi bi-calendar-event"></i> Horários</a></li>
      <li><a href="../estoque/stock.html"><i class="bi bi-stack"></i> Estoque</a></li>
      <li><a href="../validacaoQR/qr-validation.html"><i class="bi bi-qr-code-scan"></i> QR Codes</a></li>
    </nav>

    <button class="logout-btn" onclick="logout()"><i class="bi bi-box-arrow-right"></i> Sair</button>
  </aside>

  <!-- ═════════════════════════════════════════════════════CONTENT═══════════════════════════════════════ -->
  <main class="content">
    <div class="top-bar">
      <h1 class="page-title"><i class="bi bi-receipt"></i> Pedidos</h1>
      <div style="display: flex; gap: 12px;">
        <select id="filter-status" class="form-select" style="width: auto;" onchange="filtrarPedidos()">
          <option value="">Todos os Status</option>
          <option value="pendente">Pendente</option>
          <option value="confirmado">Confirmado</option>
          <option value="preparando">Preparando</option>
          <option value="pronto">Pronto</option>
          <option value="retirado">Retirado</option>
          <option value="cancelado">Cancelado</option>
        </select>
      </div>
    </div>

    <div class="table-container">
      <table class="orders-table">
        <thead>
          <tr>
            <th>Pedido</th>
            <th>Cliente</th>
            <th>Itens</th>
            <th>Total</th>
            <th>Status</th>
            <th>Ações</th>
          </tr>
        </thead>
        <tbody id="orders-body">
          <tr>
            <td colspan="6" style="text-align: center; color: var(--text-secondary);">Carregando...</td>
          </tr>
        </tbody>
      </table>
    </div>
  </main>
</div>

<!-- ═════════════════════════════════════════════════════MODAL DETALHES═════════════════════════════════════════ -->
<div class="modal" id="modal-detalhes">
  <div class="modal-content">
    <div class="modal-header" id="modal-titulo">Detalhes do Pedido</div>
    
    <div style="margin-bottom: 16px;">
      <div style="font-size: 12px; color: var(--text-secondary); text-transform: uppercase; font-weight: 600; margin-bottom: 6px;">ID do Pedido</div>
      <div style="font-family: 'Roboto Mono', monospace; font-weight: 700; font-size: 16px;" id="modal-id">PED-12345678</div>
    </div>

    <div style="margin-bottom: 16px;">
      <div style="font-size: 12px; color: var(--text-secondary); text-transform: uppercase; font-weight: 600; margin-bottom: 6px;">Cliente</div>
      <div id="modal-cliente">---</div>
    </div>

    <div style="margin-bottom: 16px;">
      <div style="font-size: 12px; color: var(--text-secondary); text-transform: uppercase; font-weight: 600; margin-bottom: 6px;">Itens</div>
      <div id="modal-itens"></div>
    </div>

    <div style="margin-bottom: 16px;">
      <div style="font-size: 12px; color: var(--text-secondary); text-transform: uppercase; font-weight: 600; margin-bottom: 6px;">Status Atual</div>
      <select id="modal-status" class="form-select"></select>
    </div>

    <button class="btn-submit" onclick="salvarAlteracao()">Salvar Alteração</button>
    <button class="btn-submit" style="background: var(--text-secondary); margin-top: 8px;" onclick="fecharModal()">Fechar</button>
  </div>
</div>

<script src="../../../db/db.js"></script>
<script src="orders.js"></script>


</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FlashLanche - Gerenciamento de Horários</title>
  <link rel="icon" type="image/jpeg" href="../../../assets/favicon.jpg">

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  
  <link rel="stylesheet" href="../../../styles.css"/>
  <link rel="stylesheet" href="timeslots.css"/>

</head>
<body>

<div class="manager-layout">
  <!-- ═════════════════════════════════════════════════════SIDEBAR═══════════════════════════════════════════ -->
  <aside class="sidebar">
    <a href="#" class="sidebar-logo">
      <div class="sidebar-logo-mark"><i class="bi bi-bag-heart-fill"></i></div>
      FlashLanche
    </a>

    <nav class="sidebar-nav">
      <li><a href="../dashboard/dashboard.html"><i class="bi bi-speedometer2"></i> Dashboard</a></li>
      <li><a href="../produtos/products.html"><i class="bi bi-box-seam"></i> Produtos</a></li>
      <li><a href="../pedidos/orders.html"><i class="bi bi-receipt"></i> Pedidos</a></li>
      <li><a href="timeslots.html" class="active"><i class="bi bi-calendar-event"></i> Horários</a></li>
      <li><a href="../estoque/stock.html"><i class="bi bi-stack"></i> Estoque</a></li>
      <li><a href="../validacaoQR/qr-validation.html"><i class="bi bi-qr-code-scan"></i> QR Codes</a></li>
    </nav>

    <button class="logout-btn" onclick="logout()"><i class="bi bi-box-arrow-right"></i> Sair</button>
  </aside>

  <!-- ═════════════════════════════════════════════════════CONTENT═══════════════════════════════════════ -->
  <main class="content">
    <div class="top-bar">
      <h1 class="page-title"><i class="bi bi-calendar-event"></i> Horários de Retirada</h1>
      <button class="btn-novo" onclick="abrirModal()"><i class="bi bi-plus-circle"></i> Novo Horário</button>
    </div>

    <div class="timeslots-grid" id="timeslots-grid"></div>
  </main>
</div>

<!-- ═════════════════════════════════════════════════════MODAL FORMULARIO════════════════════════════════════════════════════════════ -->
<div class="modal" id="modal-form">
  <div class="modal-content">
    <div class="modal-header">Novo Horário</div>
    
    <div class="form-group">
      <label class="form-label">Horário</label>
      <input type="time" id="hora" class="form-input">
    </div>

    <div class="form-group">
      <label class="form-label">Capacidade Máxima</label>
      <input type="number" id="capacidade" class="form-input" value="5" min="1">
    </div>

    <button class="btn-submit" onclick="salvarHorario()">Adicionar Horário</button>
    <button class="btn-submit" style="background: var(--text-secondary); margin-top: 8px;" onclick="fecharModal()">Cancelar</button>
  </div>
</div>

<script src="../../../db/db.js"></script>
<script src="timeslots.js"></script>


</body>
</html>
